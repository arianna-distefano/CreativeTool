<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuwakura</title>

    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chango&display=swap" rel="stylesheet">


    <script src="https://unpkg.com/konva@10/konva.min.js"></script>
    <script src="main.js" defer></script>
</head>

<body>
<h1  class="chango-regular">Fuwakura !!</h1>

<main>

    <div class="toolBar">
        <label for="img-upload">Upload Image</label>
        <input type="file" id="img-upload" accept="image/*">
    </div>

    <!-- EVERYTHING IN ONE FLEX ROW -->
    <div class="layout">


        <!-- CANVAS -->
        <div class="stageContainer">
            <div id="container"></div>
        </div>


        <!-- STICKERS SIDEBAR -->
        <section id="sidebar">
            <img src="https://files.catbox.moe/7wi6h3.png" class="asset" draggable="true">
            <img src="https://i.ibb.co/FkJXY0DB/kawaiieyes.png" class="asset" draggable="true">
            <img src="https://i.ibb.co/LdQ6Hvsx/blush.png" class="asset" draggable="true">
        </section>
        <!-- INFO PANEL -->
        <section class="infoPanel">

            <p>
                Drag and drop stickers into the canvas
            <p/>
            <p>
                crtl/cmd z to undo
            <p/>
            <p>
                Press save when you’re ready
            </p>
            <p>
            Fuwakura works best for images in the 3:2 aspect ratio (1080p x 720p)
    </div>

</main>

</body>
</html>
