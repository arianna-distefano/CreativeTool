<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Tool</title>

    <link rel="stylesheet" href="style.css">


    <script src="https://unpkg.com/konva@10/konva.min.js"></script>
    <script src="main.js" defer></script>
</head>

<body>
<h1>Creative Tool Prototype</h1>

<main>
    <div class="toolBar">
        <label for="img-upload">Upload Image</label>
        <input type="file" id="img-upload" accept="image/*">
    </div>

    <div class="stageContainer">
        <div id="container"></div>
    </div>

    <div class="layout">

        <!-- pngs-->
        <div id="sidebar">
            <img src="https://i.ibb.co/5W2pm9nZ/catears.png" class="asset" draggable="true">
            <img src="https://i.ibb.co/FkJXY0DB/kawaiieyes.png" class="asset" draggable="true">
            <img src=https://i.ibb.co/LdQ6Hvsx/blush.png" class="asset" draggable="true">
        </div>



    </div>
</main>

</body>
</html>
